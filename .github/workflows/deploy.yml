# ============================================================
# JSL Client Portfolio Portal — Deploy to EC2
# ============================================================

name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ~/apps/client-portal
            echo "[1/4] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/4] Building Docker image..."
            docker build -t client-portal .

            echo "[3/4] Stopping old container..."
            docker rm -f client-portal 2>/dev/null || true
            sleep 2

            echo "[4/4] Starting new container..."
            # Only publish Next.js (3000); FastAPI is bound to 127.0.0.1 inside
            # the container (C16 hardening). All /api/* traffic goes through
            # Next.js's rewrite to localhost:8000 inside the container.
            docker run -d \
              --name client-portal \
              --env-file .env \
              -p 8007:3000 \
              --restart unless-stopped \
              client-portal
            echo "Container started"

      - name: Wait for boot
        run: sleep 45

      - name: Health check and Nginx config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 2m
          script: |
            set -e

            echo "=== Health Check ==="
            # /api/health goes through Next.js (8007) → FastAPI (loopback in container)
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:8007/api/health > /dev/null 2>&1; then
                echo "Health check PASSED via Next.js proxy (attempt $i)"
                break
              fi
              echo "Attempt $i: portal not ready, waiting 10s..."
              sleep 10
            done
            curl -sf http://localhost:8007/api/health || { echo "FAILED: /api/health not responding"; docker logs client-portal --tail 30; exit 1; }

            echo "=== Nginx Config ==="
            CONF="/etc/nginx/sites-available/clients.jslwealth.in"
            if [ ! -f "$CONF" ]; then
              echo "Nginx config not found, skipping"
              exit 0
            fi

            # Always rewrite to ensure /api/ routing is present
            sudo cp "$CONF" "$CONF.bak.$(date +%s)"
            # Single upstream for everything: Next.js on host:8007 serves the
            # frontend AND proxies /api/* to FastAPI on the container loopback.
            # Upload tuning (no request buffering, long timeouts) stays on
            # /api/ since /api/admin/upload-* streams 35-MB CSV bodies.
            printf 'server {\n    server_name clients.jslwealth.in;\n    client_max_body_size 60m;\n\n    location /api/ {\n        proxy_pass http://127.0.0.1:8007;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 600s;\n        proxy_send_timeout 600s;\n        proxy_request_buffering off;\n    }\n\n    location / {\n        proxy_pass http://127.0.0.1:8007;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 120s;\n        proxy_send_timeout 120s;\n    }\n\n    listen 443 ssl;\n    ssl_certificate /etc/letsencrypt/live/clients.jslwealth.in/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/clients.jslwealth.in/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n}\nserver {\n    if ($host = clients.jslwealth.in) {\n        return 301 https://$host$request_uri;\n    }\n    listen 80;\n    server_name clients.jslwealth.in;\n    return 404;\n}\n' | sudo tee "$CONF" > /dev/null
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx configured: all traffic -> Next.js:8007 (which proxies /api/* internally to FastAPI)"

            echo "=== Final verification ==="
            curl -sf http://localhost:8007/api/health
            echo ""
            echo "=== Deploy complete ==="
