# ============================================================
# JSL Client Portfolio Portal — Deploy to EC2
# Triggers on push to main branch.
# SSH into EC2, pull latest code, rebuild Docker, health check.
# ============================================================

name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            echo "=== Deploying Client Portal ==="

            cd ~/apps/client-portal

            echo "[1/5] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/5] Building Docker image..."
            docker build --build-arg CACHEBUST=$(date +%s) -t client-portal .

            echo "[3/5] Stopping old container..."
            docker rm -f client-portal 2>/dev/null || true
            sleep 3  # Wait for removal to fully complete

            echo "[4/5] Starting new container..."
            docker run -d \
              --name client-portal \
              --env-file .env \
              -p 8007:3000 \
              -p 8008:8000 \
              --restart unless-stopped \
              client-portal

            echo "[5/5] Health check..."
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://localhost:8007/api/health > /dev/null; then
                break
              fi
              echo "Attempt $i: waiting for container..."
            done
            if curl -sf http://localhost:8007/api/health > /dev/null; then
              echo "Health check PASSED"
            else
              echo "Health check FAILED — rolling back"
              docker logs client-portal --tail 50
              exit 1
            fi

            echo "[6/6] Configuring Nginx for direct API routing..."
            CONF="/etc/nginx/sites-available/clients.jslwealth.in"
            if [ -f "$CONF" ]; then
              # Only update if /api/ location block is missing
              if ! grep -q "location /api/" "$CONF"; then
                sudo cp "$CONF" "$CONF.bak"
                sudo tee "$CONF" > /dev/null << 'NGINX'
server {
    server_name clients.jslwealth.in;
    client_max_body_size 60m;

    location /api/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/clients.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clients.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = clients.jslwealth.in) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name clients.jslwealth.in;
    return 404;
}
NGINX
                sudo nginx -t && sudo systemctl reload nginx
                echo "Nginx updated: /api/ → FastAPI:8008"
              else
                echo "Nginx already configured for /api/ routing"
              fi
            fi

            echo "=== Deploy complete ==="
