# ============================================================
# JSL Client Portfolio Portal — Deploy to EC2
# Triggers on push to main branch.
# SSH into EC2, pull latest code, rebuild Docker, health check.
# ============================================================

name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== Deploying Client Portal ==="

            cd ~/apps/client-portal

            echo "[1/6] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/6] Building Docker image..."
            docker build -t client-portal .

            echo "[3/6] Stopping old container..."
            docker rm -f client-portal 2>/dev/null || true
            sleep 2

            echo "[4/6] Starting new container..."
            docker run -d \
              --name client-portal \
              --env-file .env \
              -p 8007:3000 \
              -p 8008:8000 \
              --restart unless-stopped \
              client-portal

            echo "[5/6] Health check..."
            for i in 1 2 3 4 5 6 7 8; do
              sleep 5
              if curl -sf http://localhost:8007/api/health > /dev/null 2>&1; then
                echo "Health check PASSED on attempt $i"
                break
              fi
              echo "Attempt $i: waiting for container..."
            done
            curl -sf http://localhost:8007/api/health > /dev/null 2>&1 || { echo "Health check FAILED"; docker logs client-portal --tail 50; exit 1; }

            echo "[6/6] Configuring Nginx..."
            CONF="/etc/nginx/sites-available/clients.jslwealth.in"
            if [ -f "$CONF" ] && ! grep -q "location /api/" "$CONF"; then
              sudo cp "$CONF" "$CONF.bak"
              printf 'server {\n    server_name clients.jslwealth.in;\n    client_max_body_size 60m;\n\n    location /api/ {\n        proxy_pass http://127.0.0.1:8008;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 600s;\n        proxy_send_timeout 600s;\n        proxy_request_buffering off;\n    }\n\n    location / {\n        proxy_pass http://127.0.0.1:8007;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 120s;\n        proxy_send_timeout 120s;\n    }\n\n    listen 443 ssl;\n    ssl_certificate /etc/letsencrypt/live/clients.jslwealth.in/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/clients.jslwealth.in/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n}\nserver {\n    if ($host = clients.jslwealth.in) {\n        return 301 https://$host$request_uri;\n    }\n    listen 80;\n    server_name clients.jslwealth.in;\n    return 404;\n}\n' | sudo tee "$CONF" > /dev/null
              sudo nginx -t && sudo systemctl reload nginx
              echo "Nginx updated: /api/ -> FastAPI:8008"
            else
              echo "Nginx already configured"
            fi

            echo "=== Deploy complete ==="
