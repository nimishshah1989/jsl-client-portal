name: Fix duplicate transactions

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run fix via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -e
            echo "=== Fix duplicate transactions ==="

            cd ~/apps/client-portal

            echo "[1/4] Counting duplicates..."
            docker exec client-portal python3 -c "
            import asyncio
            from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
            from sqlalchemy.orm import sessionmaker
            from sqlalchemy import text
            import os

            async def main():
                url = os.environ['DATABASE_URL']
                engine = create_async_engine(url, pool_size=3)
                S = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
                async with S() as db:
                    r = await db.execute(text('SELECT COUNT(*) FROM cpp_transactions'))
                    print(f'Total before: {r.scalar()}')
                    r = await db.execute(text('''SELECT SUM(cnt-1) FROM (SELECT COUNT(*) as cnt FROM cpp_transactions GROUP BY client_id,portfolio_id,txn_date,txn_type,symbol,quantity,price,settlement_no HAVING COUNT(*)>1) d'''))
                    print(f'Excess duplicates: {r.scalar() or 0}')
                await engine.dispose()
            asyncio.run(main())
            "

            echo "[2/4] Deleting duplicates..."
            docker exec client-portal python3 -c "
            import asyncio, os
            from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
            from sqlalchemy.orm import sessionmaker
            from sqlalchemy import text

            async def main():
                engine = create_async_engine(os.environ['DATABASE_URL'], pool_size=3)
                S = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
                async with S() as db:
                    await db.execute(text('''DELETE FROM cpp_transactions WHERE id NOT IN (SELECT MIN(id) FROM cpp_transactions GROUP BY client_id,portfolio_id,txn_date,txn_type,symbol,quantity,price,settlement_no)'''))
                    await db.commit()
                    r = await db.execute(text('SELECT COUNT(*) FROM cpp_transactions'))
                    print(f'Total after: {r.scalar()}')
                await engine.dispose()
            asyncio.run(main())
            "

            echo "[3/4] Adding unique constraint..."
            docker exec client-portal python3 -c "
            import asyncio, os
            from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
            from sqlalchemy.orm import sessionmaker
            from sqlalchemy import text

            async def main():
                engine = create_async_engine(os.environ['DATABASE_URL'], pool_size=3)
                S = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
                async with S() as db:
                    r = await db.execute(text(\"\"\"SELECT 1 FROM pg_constraint WHERE conname='uq_cpp_txn_dedup'\"\"\"))
                    if r.fetchone() is None:
                        await db.execute(text('''ALTER TABLE cpp_transactions ADD CONSTRAINT uq_cpp_txn_dedup UNIQUE (client_id,portfolio_id,txn_date,txn_type,symbol,quantity,price,settlement_no)'''))
                        await db.commit()
                        print('Constraint added')
                    else:
                        print('Constraint already exists')
                await engine.dispose()
            asyncio.run(main())
            "

            echo "[4/4] Recomputing holdings..."
            docker exec client-portal python3 -c "
            import asyncio, os, sys
            sys.path.insert(0, '/app')
            from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
            from sqlalchemy.orm import sessionmaker
            from sqlalchemy import text
            from backend.services.ingestion_helpers import recompute_holdings

            async def main():
                engine = create_async_engine(os.environ['DATABASE_URL'], pool_size=5)
                S = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
                async with S() as db:
                    r = await db.execute(text('SELECT DISTINCT c.id,p.id,c.client_code FROM cpp_clients c JOIN cpp_portfolios p ON p.client_id=c.id WHERE c.is_active=true ORDER BY c.client_code'))
                    pairs = r.fetchall()
                    ok = 0
                    for cid, pid, code in pairs:
                        try:
                            await recompute_holdings(db, cid, pid)
                            await db.commit()
                            ok += 1
                        except Exception as e:
                            await db.rollback()
                            if ok < 3: print(f'Failed {code}: {e}')
                    print(f'Holdings recomputed: {ok}/{len(pairs)}')
                await engine.dispose()
            asyncio.run(main())
            "

            echo "=== Done ==="
