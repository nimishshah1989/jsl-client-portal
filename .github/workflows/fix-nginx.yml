name: Fix Nginx Upload Limits

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fix Nginx config via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script: |
            set -e
            echo "=== Fixing Nginx: route /api/ directly to FastAPI ==="

            CONF="/etc/nginx/sites-available/clients.jslwealth.in"
            if [ ! -f "$CONF" ]; then
              echo "ERROR: $CONF not found"
              exit 1
            fi

            # Backup
            sudo cp "$CONF" "$CONF.bak.$(date +%s)"

            # Write new config: /api/ → FastAPI:8008, / → Next.js:8007
            sudo tee "$CONF" > /dev/null << 'NGINX'
server {
    server_name clients.jslwealth.in;

    client_max_body_size 60m;

    # API calls go directly to FastAPI (port 8008) — bypasses Next.js proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    # Frontend goes to Next.js (port 8007)
    location / {
        proxy_pass http://127.0.0.1:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/clients.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clients.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = clients.jslwealth.in) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name clients.jslwealth.in;
    return 404;
}
NGINX

            echo "=== Updated config ==="
            cat "$CONF"

            echo "=== Testing ==="
            sudo nginx -t

            echo "=== Reloading ==="
            sudo systemctl reload nginx

            echo "=== Done ==="
