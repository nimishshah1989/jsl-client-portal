# ============================================================
# Run the Python test suite on every PR (and on main pushes).
# The suite runs entirely on SQLite — it never connects to RDS — so no
# database service is needed. DATABASE_URL below is a dummy that only has to
# satisfy config.py's format validation; nothing ever dials it.
# ============================================================

name: Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy, format-valid only. The suite uses in-memory/temp-file SQLite
      # sessions and never opens this connection.
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      # >= 32 chars (config.py requirement). Test-only, not a real secret.
      JWT_SECRET: ci-only-test-secret-0123456789abcdef0123456789abcdef
      JWT_EXPIRY_HOURS: "48"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install aiosqlite   # test-only async SQLite driver (not a runtime dep)

      - name: Run test suite
        run: pytest -q
