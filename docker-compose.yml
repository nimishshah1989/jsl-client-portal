# ============================================================
# JSL Client Portfolio Portal — Docker Compose
# Single container: Next.js + FastAPI bundled together
# Port 8007 on host maps to port 3000 (Next.js) in container
# Next.js proxies /api/* to FastAPI on port 8000 internally
# ============================================================

version: '3.8'

services:
  client-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-portal
    env_file:
      - .env
    ports:
      - "8007:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
